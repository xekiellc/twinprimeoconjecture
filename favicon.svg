<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: warm paper -->
  <rect width="32" height="32" rx="3" fill="#F2EDE4"/>
  <!-- Twin prime dots in oxblood -->
  <circle cx="9" cy="15" r="4" fill="#7A1C1C"/>
  <circle cx="23" cy="15" r="4" fill="#7A1C1C"/>
  <!-- Connecting line in slate -->
  <line x1="13" y1="15" x2="19" y2="15" stroke="#2C3E6B" stroke-width="1.5"/>
  <!-- p · p+2 label -->
  <text x="16" y="27" text-anchor="middle" font-family="monospace" font-size="4.5"
    fill="#8C7F72" letter-spacing="0.3">p · p+2</text>
</svg>
